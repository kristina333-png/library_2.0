version: '3.8'

services:
  db:
    image: postgres:15
    container_name: library_db
    environment:
      POSTGRES_DB: library
      POSTGRES_USER: enfdb
      POSTGRES_PASSWORD: 123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U enfdb -d library"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: library_app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://enfdb:123@db:5432/library
    volumes:
      - .:/app

volumes:
  postgres_data: